<template id="scene-hook-template">
  <div data-composition-id="scene-hook" data-width="1920" data-height="1080" data-duration="5">
    <div class="scene-content">
      <div class="logo-frame">
        <img class="logo-image" src="assets/logo-salvador-barba.png" alt="Salvador Barba" />
      </div>
      <h1 class="headline">¡Hola! Soy Salvador Barba</h1>
      <p class="subline">Desarrollo web y sistemas digitales para negocios</p>
    </div>
    <style>
      [data-composition-id="scene-hook"] .scene-content {
        width: 100%; height: 100%; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 48px;
        background: radial-gradient(ellipse at 50% 40%, #1a1a1a 0%, #0A0A0A 70%);
        padding: 0 80px 120px;
      }
      [data-composition-id="scene-hook"] .logo-frame {
        width: 180px; height: 180px; border-radius: 36px; overflow: hidden;
        border: 1px solid rgba(255,255,255,0.14);
        box-shadow: 0 24px 80px rgba(0,0,0,0.45);
        background: #0a0a0a;
      }
      [data-composition-id="scene-hook"] .logo-image {
        width: 100%; height: 100%; object-fit: cover; display: block;
      }
      [data-composition-id="scene-hook"] .headline {
        font-size: 72px; font-weight: 700; color: #F5F5F5; text-align: center;
        line-height: 1.12; letter-spacing: -0.03em; max-width: 1200px;
      }
      [data-composition-id="scene-hook"] .subline {
        font-size: 30px; color: #A3A3A3; text-align: center; max-width: 820px; line-height: 1.35;
      }
    </style>
    <script>
    (function(){
      const tl = gsap.timeline({ paused: true });
      tl.from(".logo-frame", { scale: 0.6, opacity: 0, duration: 0.7, ease: "back.out(1.4)" }, 0);
      tl.from(".headline", { y: 50, opacity: 0, duration: 0.8, ease: "power3.out" }, 0.25);
      tl.from(".subline", { y: 30, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.55);
      tl.to(".scene-content", { opacity: 0, duration: 0.45, ease: "power2.in" }, 4.2);
      window.__timelines = window.__timelines || {};
      window.__timelines["scene-hook"] = tl;
    })();
    </script>
  </div>
</template>
