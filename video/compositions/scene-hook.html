<template id="scene-hook-template">
  <div data-composition-id="scene-hook" data-width="1920" data-height="1080" data-duration="4">
    <div class="scene-content">
      <div class="logo-box">
        <div class="logo-mark">SA</div>
      </div>
      <h1 class="headline">Sitios y sistemas<br/>para tu negocio</h1>
    </div>
    <style>
      [data-composition-id="scene-hook"] .scene-content {
        width: 100%; height: 100%; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 48px;
        background: radial-gradient(ellipse at 50% 40%, #1a1a1a 0%, #0A0A0A 70%);
      }
      [data-composition-id="scene-hook"] .logo-box {
        width: 140px; height: 140px; border-radius: 28px; background: #F5F5F5;
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="scene-hook"] .logo-mark {
        font-size: 64px; font-weight: 800; color: #0A0A0A; letter-spacing: -0.04em;
      }
      [data-composition-id="scene-hook"] .headline {
        font-size: 88px; font-weight: 700; color: #F5F5F5; text-align: center;
        line-height: 1.05; letter-spacing: -0.03em;
      }
    </style>
    <script>
    (function(){
      const tl = gsap.timeline({ paused: true });
      tl.from(".logo-box", { scale: 0.6, opacity: 0, duration: 0.7, ease: "back.out(1.4)" }, 0);
      tl.from(".headline", { y: 50, opacity: 0, duration: 0.8, ease: "power3.out" }, 0.3);
      tl.to(".scene-content", { opacity: 0, duration: 0.5, ease: "power2.in" }, 3.3);
      window.__timelines = window.__timelines || {};
      window.__timelines["scene-hook"] = tl;
    })();
    </script>
  </div>
</template>
