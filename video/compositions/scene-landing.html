<template id="scene-landing-template">
  <div data-composition-id="scene-landing" data-width="1920" data-height="1080" data-duration="5">
    <div class="scene-content">
      <div class="browser">
        <div class="browser-bar">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          <span class="url">tunegocio.com</span>
        </div>
        <div class="browser-body">
          <div class="hero-mock">
            <div class="mock-nav"></div>
            <div class="mock-h1"></div>
            <div class="mock-sub"></div>
            <div class="mock-cta"></div>
          </div>
        </div>
      </div>
    </div>
    <style>
      [data-composition-id="scene-landing"] .scene-content {
        width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
        background: #0A0A0A;
      }
      [data-composition-id="scene-landing"] .browser {
        width: 1200px; border-radius: 16px; overflow: hidden;
        border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 40px 80px rgba(0,0,0,0.6);
      }
      [data-composition-id="scene-landing"] .browser-bar {
        height: 48px; background: #141414; display: flex; align-items: center; gap: 8px; padding: 0 16px;
      }
      [data-composition-id="scene-landing"] .dot { width: 12px; height: 12px; border-radius: 50%; background: #333; }
      [data-composition-id="scene-landing"] .url { margin-left: 16px; color: #737373; font-size: 14px; }
      [data-composition-id="scene-landing"] .browser-body { height: 600px; background: #0A0A0A; overflow: hidden; }
      [data-composition-id="scene-landing"] .hero-mock { padding: 48px; }
      [data-composition-id="scene-landing"] .mock-nav { width: 120px; height: 24px; background: #F5F5F5; border-radius: 4px; margin-bottom: 80px; opacity: 0.9; }
      [data-composition-id="scene-landing"] .mock-h1 { width: 70%; height: 48px; background: #F5F5F5; border-radius: 6px; margin-bottom: 24px; }
      [data-composition-id="scene-landing"] .mock-sub { width: 50%; height: 20px; background: #333; border-radius: 4px; margin-bottom: 40px; }
      [data-composition-id="scene-landing"] .mock-cta { width: 200px; height: 48px; background: #E8E8E8; border-radius: 8px; }
    </style>
    <script>
    (function(){
      const tl = gsap.timeline({ paused: true });
      tl.from(".browser", { y: 80, opacity: 0, scale: 0.92, duration: 0.8, ease: "power3.out" }, 0);
      tl.to(".browser-body", { y: -120, duration: 2.5, ease: "power1.inOut" }, 1);
      tl.to(".browser", { scale: 1.03, duration: 3, ease: "none" }, 1);
      tl.to(".scene-content", { opacity: 0, duration: 0.4 }, 4.4);
      window.__timelines = window.__timelines || {};
      window.__timelines["scene-landing"] = tl;
    })();
    </script>
  </div>
</template>
